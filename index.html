<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator and Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        /* App Container Styling matching your dark blue theme */
        .app-box {
            background-color: #1a233d;
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 280px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }
        h2 { margin-top: 0; font-family: serif; }
        .screen {
            background-color: #ffffff;
            color: #000;
            height: 40px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #e2e8f0;
            color: #333;
            font-weight: bold;
        }
        button.clear { background-color: #ff6b6b; color: white; }
        button.equal { 
            grid-column: span 4; 
            background-color: #4caf50; 
            color: white; 
        }
        /* Counter Specific Styling */
        .counter-controls {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .btn-counter { padding: 10px 20px; color: white; }
        .btn-inc { background-color: #4caf50; }
        .btn-dec { background-color: #ff9800; }
        .btn-reset { background-color: #f44336; }
    </style>
</head>
<body>

    <div class="app-box">
        <h2>Calculator</h2>
        <div class="screen" id="calc-screen">0</div>
        <div class="grid">
            <button class="clear" onclick="clearScreen()">C</button>
            <button onclick="press('/')">÷</button>
            <button onclick="press('*')">×</button>
            <button onclick="press('-')">-</button>
            
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('+')">+</button>
            
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('.')">.</button>
            
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('0')">0</button>
            
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <div class="app-box">
        <h2>Counter</h2>
        <div class="screen" id="counter-screen">000</div>
        <div class="counter-controls">
            <button class="btn-counter btn-inc" onclick="changeCounter(1)">+</button>
            <button class="btn-counter btn-reset" onclick="resetCounter()">Reset</button>
            <button class="btn-counter btn-dec" onclick="changeCounter(-1)">-</button>
        </div>
    </div>

    <script>
        // Calculator Logic
        let calcScreen = document.getElementById('calc-screen');
        let currentInput = '';

        function press(value) {
            if (calcScreen.innerText === '0' && !isNaN(value)) {
                currentInput = value;
            } else {
                currentInput += value;
            }
            calcScreen.innerText = currentInput;
        }

        function clearScreen() {
            currentInput = '';
            calcScreen.innerText = '0';
        }

        function calculate() {
            try {
                // eval() processes the string expression mathematically
                let result = eval(currentInput);
                calcScreen.innerText = result;
                currentInput = result.toString();
            } catch (error) {
                calcScreen.innerText = 'Error';
                currentInput = '';
            }
        }

        // Counter Logic
        let counterScreen = document.getElementById('counter-screen');
        let count = 0;

        function changeCounter(amount) {
            count += amount;
            // Pad numbers with leading zeros to match your '000' layout
            counterScreen.innerText = String(count).padStart(3, '0');
        }

        function resetCounter() {
            count = 0;
            counterScreen.innerText = '000';
        }
    </script>

</body>
</html>
